services:
  - type: web
    name: queueless-campus-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
